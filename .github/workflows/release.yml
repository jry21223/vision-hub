name: Build & Release APK

on:
  push:
    branches:
      - android
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout android branch
        uses: actions/checkout@v4
        with:
          ref: android

      - name: Resolve version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            VER=$(grep 'versionName' app/build.gradle.kts | grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"')
            echo "name=v${VER}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Android SDK platform 36
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" 2>/dev/null || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/vision-hub-${{ steps.tag.outputs.name }}.apk

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: 暖阳守护 VisionHub ${{ steps.tag.outputs.name }}
          files: app/build/outputs/apk/debug/vision-hub-${{ steps.tag.outputs.name }}.apk
          body: |
            ## 暖阳守护 VisionHub ${{ steps.tag.outputs.name }}

            ### 新增功能
            - 用户注册 / 登录 / 找回密码（JWT 鉴权）
            - 老人信息管理（姓名、年龄、性别、病史备注）
            - 在线设备搜索与绑定 / 解绑
            - 云端告警历史（摔倒 / 避障 / 药品识别）
            - GPS 定位信息展示
            - FCM 推送通知（弹窗 + 铃声双重提醒）
            - 配置信息（紧急联系人 / 跌倒灵敏度）上传云端

            ### 安装说明
            1. 下载 `vision-hub-${{ steps.tag.outputs.name }}.apk`
            2. Android 设置 → 安全 → 允许安装未知来源应用
            3. 打开 APK 文件安装
            4. 首次启动请授予通话权限（紧急拨号）和通知权限

            > **注意**：FCM 推送需配置 `google-services.json`，调试包默认已关闭自动初始化。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
