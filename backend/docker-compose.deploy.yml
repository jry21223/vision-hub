services:
  postgres:
    image: postgres:16-alpine
    container_name: visionhub-postgres
    environment:
      POSTGRES_USER: visionhub
      POSTGRES_PASSWORD: visionhub
      POSTGRES_DB: visionhub
    ports:
      - "5432:5432"
    volumes:
      - visionhub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionhub -d visionhub"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: visionhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: visionhub-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --node-id
      - "0"
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --check=false
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visionhub-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  visionhub_pg_data:
